name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 21 * * *'  # 00:00 Istanbul (UTC+3)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create cPanel deployment file
        run: |
          cat << 'EOF' > ./out/.cpanel.yml
          ---
          deployment:
            tasks:
              - export DEPLOYPATH=/home/drmust11/public_html/
              - /bin/cp -R * $DEPLOYPATH
          EOF

      - name: Deploy to Production Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: production
          force_orphan: true
